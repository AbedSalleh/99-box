<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>99 Box</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>99 Box</h1>
      <p class="tagline">
        99 boxes. Anyone can lock a secret in an empty one. Everything is wiped
        when the clock runs out.
      </p>
      <div class="clock" id="clock">
        <span class="clock-label">All boxes wipe in</span>
        <span class="clock-time" id="clock-time">--:--</span>
      </div>
    </header>

    <main>
      <div class="legend">
        <span><i class="swatch swatch-empty"></i> empty — click to fill</span>
        <span><i class="swatch swatch-filled"></i> filled — click to open</span>
      </div>
      <div class="grid" id="grid" aria-label="Box wall"></div>
    </main>

    <!-- Modal -->
    <div class="overlay hidden" id="overlay">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="close" id="modal-close" aria-label="Close">&times;</button>
        <h2 id="modal-title"></h2>
        <div id="modal-body"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
